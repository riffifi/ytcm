name: YTCm
description: YTC Messenger client
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: ABCDiatype
      fonts:
        - asset: fonts/ABCDiatypeCyrillicVariable-Trial.ttf
